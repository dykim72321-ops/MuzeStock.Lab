name: Python Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'python_engine/**'
      - 'python_engine/Dockerfile'
      - 'python_engine/docker-compose.yml'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python_engine/**'
      - 'python_engine/Dockerfile'
      - 'python_engine/docker-compose.yml'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch: # 수동 실행 허용

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python_engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python_engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv
          # exit-zero treats all errors as warnings. The GitHub editor is 120 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=venv

      - name: Check formatting with Black
        run: |
          black --check --diff --exclude venv .

      - name: Verify critical imports
        run: |
          python -c "import fastapi; import uvicorn; import pandas; import yfinance; import supabase; import alpaca.data.live; import playwright; print('✅ All critical imports successful!')"

      - name: Run placeholder tests
        run: |
          # No user tests found in python_engine root, running a basic sanity check
          python -m pytest --version

      - name: Summary
        run: echo "🐍 Python Engine CI (3.11) completed successfully!"
